<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bombay Asteroids — Admin Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../charts.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f1f5f9;
      color: #1e293b;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    /* ── Top nav bar ── */
    .topbar {
      background: #0f172a;
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .topbar-logo {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      color: #00fff5;
      letter-spacing: 3px;
      text-shadow: 0 0 12px rgba(0,255,245,0.5);
    }
    .topbar-sep { color: #334155; font-size: 18px; }
    .topbar-sub {
      font-size: 12px;
      color: #64748b;
      letter-spacing: 1px;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .dash-ver-badge {
      background: rgba(0,255,245,0.1);
      border: 1px solid rgba(0,255,245,0.25);
      color: #00fff5;
      font-size: 10px;
      letter-spacing: 2px;
      padding: 4px 10px;
      border-radius: 20px;
      font-family: 'Orbitron', monospace;
    }
    .refresh-btn {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      font-size: 11px;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      letter-spacing: 1px;
      transition: all 0.15s;
    }
    .refresh-btn:hover { border-color: #00fff5; color: #00fff5; }

    /* ── Page body ── */
    .page { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }

    .page-header { margin-bottom: 24px; }
    .page-title { font-size: 22px; font-weight: 700; color: #0f172a; }
    .page-date   { font-size: 12px; color: #94a3b8; margin-top: 2px; }

    /* ── Status ── */
    #status {
      font-size: 13px;
      color: #64748b;
      padding: 20px 0;
      letter-spacing: 1px;
    }
    .loading { color: #06b6d4; animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── Stat cards ── */
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 20px 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      border-left: 4px solid #e2e8f0;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 60px; height: 60px;
      border-radius: 0 12px 0 60px;
      opacity: 0.08;
    }
    .stat-card.c-blue   { border-left-color: #3b82f6; } .stat-card.c-blue::before   { background: #3b82f6; }
    .stat-card.c-purple { border-left-color: #8b5cf6; } .stat-card.c-purple::before { background: #8b5cf6; }
    .stat-card.c-green  { border-left-color: #10b981; } .stat-card.c-green::before  { background: #10b981; }
    .stat-card.c-amber  { border-left-color: #f59e0b; } .stat-card.c-amber::before  { background: #f59e0b; }
    .stat-card.c-cyan   { border-left-color: #06b6d4; } .stat-card.c-cyan::before   { background: #06b6d4; }
    .stat-card.c-red    { border-left-color: #ef4444; } .stat-card.c-red::before    { background: #ef4444; }
    .stat-label { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: #94a3b8; margin-bottom: 10px; }
    .stat-value { font-size: 32px; font-weight: 700; color: #0f172a; line-height: 1; }
    .stat-card.c-blue   .stat-value { color: #3b82f6; }
    .stat-card.c-purple .stat-value { color: #8b5cf6; }
    .stat-card.c-green  .stat-value { color: #10b981; }
    .stat-card.c-amber  .stat-value { color: #f59e0b; }
    .stat-card.c-cyan   .stat-value { color: #06b6d4; }
    .stat-card.c-red    .stat-value { color: #ef4444; }

    /* ── Charts grid ── */
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .chart-card-full { grid-column: 1 / -1; }
    @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } .chart-card-full { grid-column: 1; } }

    .chart-card {
      background: #fff;
      border-radius: 12px;
      padding: 22px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    }
    .chart-card-title {
      font-size: 13px;
      font-weight: 700;
      color: #1e293b;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }
    .chart-card-sub {
      font-size: 11px;
      color: #94a3b8;
      margin-bottom: 20px;
    }

    /* ── Table card ── */
    .table-card {
      background: #fff;
      border-radius: 12px;
      padding: 22px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      margin-bottom: 32px;
    }
    .table-header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    .table-card-title { font-size: 13px; font-weight: 700; color: #1e293b; }
    .table-card-sub   { font-size: 11px; color: #94a3b8; margin-bottom: 16px; }

    table { width: 100%; border-collapse: collapse; }
    thead tr { border-bottom: 2px solid #f1f5f9; }
    th {
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #64748b;
      padding: 10px 14px;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      transition: color 0.15s;
    }
    th:hover { color: #0f172a; }
    th.col-active { color: #3b82f6; }
    .si {
      display: inline-block;
      margin-left: 4px;
      font-family: monospace, sans-serif;
      font-size: 10px;
      color: #cbd5e1;
    }
    th.col-active .si { color: #3b82f6; }

    tbody tr { border-bottom: 1px solid #f8fafc; transition: background 0.1s; }
    tbody tr:hover { background: #f8fafc; }
    tbody tr:last-child { border-bottom: none; }
    td { padding: 11px 14px; font-size: 13px; color: #1e293b; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-gold   { background: #fef3c7; color: #d97706; }
    .badge-silver { background: #f1f5f9; color: #64748b; }
    .badge-bronze { background: #fef3c7; color: #92400e; }
    .score-val { font-weight: 700; color: #0f172a; }
    .level-val { font-weight: 600; color: #7c3aed; font-size: 12px; }
    .date-val  { color: #64748b; font-size: 12px; }
    .ver-val   { color: #94a3b8; font-size: 11px; }
    .rank-num  { font-weight: 700; color: #94a3b8; font-size: 13px; }
    .rank-num.g { color: #d97706; }
    .rank-num.s { color: #64748b; }
    .rank-num.b { color: #b45309; }
  </style>
</head>
<body>

<!-- Top nav -->
<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">BOMBAY ASTEROIDS</div>
    <div class="topbar-sep">/</div>
    <div class="topbar-sub">ADMIN DASHBOARD</div>
  </div>
  <div class="topbar-right">
    <span class="dash-ver-badge" id="dash-ver"></span>
    <button class="refresh-btn" onclick="location.reload()">↻ REFRESH</button>
  </div>
</div>

<div class="page">
  <div class="page-header">
    <div class="page-title">Analytics Overview</div>
    <div class="page-date" id="page-date"></div>
  </div>

  <div id="status" class="loading">Fetching data...</div>

  <!-- Stats -->
  <div class="stats-row" id="stats-row" style="display:none"></div>

  <!-- Charts -->
  <div class="charts-grid" id="charts-grid" style="display:none">
    <div class="chart-card chart-card-full" id="score-card">
      <div class="chart-card-title">Top 15 Players</div>
      <div class="chart-card-sub">Ranked by score</div>
      <canvas id="scoreChart" height="70"></canvas>
    </div>
    <div class="chart-card" id="heatmap-card" style="display:none">
      <div class="chart-card-title">Death Heatmap</div>
      <div class="chart-card-sub">Players lost per level — redder = deadlier</div>
      <canvas id="heatmapChart" height="160"></canvas>
    </div>
    <div class="chart-card" id="dap-card" style="display:none">
      <div class="chart-card-title">Daily Active Players</div>
      <div class="chart-card-sub">Unique players per day</div>
      <canvas id="dapChart" height="160"></canvas>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card" id="table-card" style="display:none">
    <div class="table-header-row">
      <div class="table-card-title">All Scores</div>
    </div>
    <div class="table-card-sub">Click any column header to sort</div>
    <table>
      <thead><tr>
        <th onclick="sortBy('rank')"      id="th-rank">      # <span class="si" id="si-rank">v</span></th>
        <th onclick="sortBy('name')"      id="th-name">      Player <span class="si" id="si-name">-</span></th>
        <th onclick="sortBy('score')"     id="th-score">     Score <span class="si" id="si-score">-</span></th>
        <th onclick="sortBy('level')"     id="th-level">     Level <span class="si" id="si-level">-</span></th>
        <th onclick="sortBy('timestamp')" id="th-timestamp"> Date / Time <span class="si" id="si-timestamp">-</span></th>
        <th onclick="sortBy('version')"   id="th-version">   Version <span class="si" id="si-version">-</span></th>
      </tr></thead>
      <tbody id="score-table"></tbody>
    </table>
  </div>
</div>

<script>
const DASHBOARD_VERSION = 'v1.4';
document.getElementById('dash-ver').textContent = DASHBOARD_VERSION;
document.getElementById('page-date').textContent = new Date().toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

let allScores = [];
let sortCol   = 'rank';
let sortDir   = 'asc';

const LIGHT_CHART = {
  plugins: { legend: { display: false } },
  scales: {
    x: { ticks: { color: '#94a3b8', font: { size: 11, family: 'Inter' }, maxRotation: 40 }, grid: { color: 'rgba(0,0,0,0.04)' } },
    y: { ticks: { color: '#94a3b8', font: { size: 11, family: 'Inter' } }, grid: { color: 'rgba(0,0,0,0.04)' } }
  }
};


// Heat color: green → yellow → red (light-bg friendly)
function heatColor(t) {
  if (t < 0.5) {
    const s = t * 2;
    return `rgba(${Math.round(16+239*s)},${Math.round(185-100*s)},${Math.round(129-129*s)},0.75)`;
  }
  const s = (t-0.5)*2;
  return `rgba(${Math.round(255)},${Math.round(85-85*s)},${Math.round(0)},${0.7+0.25*s})`;
}

// ── Sort ──────────────────────────────────────────────
function sortBy(col) {
  sortDir = (sortCol === col && sortDir === 'desc') ? 'asc' : 'desc';
  sortCol = col;
  updateSortUI();
  renderTable();
}

function updateSortUI() {
  ['rank','name','score','level','timestamp','version'].forEach(col => {
    const th = document.getElementById('th-'+col);
    const si = document.getElementById('si-'+col);
    if (!th || !si) return;
    if (col === sortCol) { th.className = 'col-active'; si.textContent = sortDir === 'asc' ? '[^]' : '[v]'; }
    else                 { th.className = '';           si.textContent = '[-]'; }
  });
}

function getSortedScores() {
  return [...allScores].sort((a, b) => {
    let va = a[sortCol]??'', vb = b[sortCol]??'';
    if (['score','level','rank'].includes(sortCol)) {
      va = Number(va)||0; vb = Number(vb)||0;
      return sortDir==='asc' ? va-vb : vb-va;
    }
    va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
    const c = va<vb?-1:va>vb?1:0;
    return sortDir==='asc' ? c : -c;
  });
}

function rankClass(pos) { return pos===1?'g':pos===2?'s':pos===3?'b':''; }

function renderTable() {
  document.getElementById('score-table').innerHTML = getSortedScores().map((r, i) => {
    const pos = i+1;
    const rc  = sortCol==='rank' ? rankClass(pos) : '';
    return `<tr>
      <td><span class="rank-num ${rc}">${r.rank}</span></td>
      <td style="font-weight:600">${r.name}</td>
      <td><span class="score-val">${r.score.toLocaleString()}</span></td>
      <td><span class="level-val">${r.level ? 'Lv '+r.level : '—'}</span></td>
      <td><span class="date-val">${r.timestamp||'—'}</span></td>
      <td><span class="ver-val">${r.version||'—'}</span></td>
    </tr>`;
  }).join('');
}

// ── Load ─────────────────────────────────────────────
async function load() {
  let key = getKey();
  if (!key) { key = promptKey(); if (!key) return; }
  try {
    const res = await fetch(BA_API + key);
    if (res.status === 401) {
      sessionStorage.removeItem('ba_admin_key');
      document.getElementById('status').textContent = 'Wrong key. Refresh to try again.';
      document.getElementById('status').style.color = '#ef4444';
      return;
    }
    if (!res.ok) throw new Error('HTTP '+res.status);
    render(await res.json());
  } catch(e) {
    document.getElementById('status').textContent = 'Error: '+e.message;
    document.getElementById('status').style.color = '#ef4444';
  }
}

function render(data) {
  allScores = data.scores || [];
  document.getElementById('status').style.display = 'none';

  const { lvLabels, lvData, maxDeaths, hardestLv, days, dayLabels, dayCounts, todayCount, topScore, avg, names } = computeData(allScores);

  const statsRow = document.getElementById('stats-row');
  statsRow.style.display = 'grid';
  statsRow.innerHTML = `
    <div class="stat-card c-blue">  <div class="stat-label">Total Plays</div>  <div class="stat-value">${data.total||0}</div></div>
    <div class="stat-card c-purple"><div class="stat-label">Unique Players</div><div class="stat-value">${names}</div></div>
    <div class="stat-card c-green"> <div class="stat-label">Today Active</div>  <div class="stat-value">${todayCount}</div></div>
    <div class="stat-card c-amber"> <div class="stat-label">Top Score</div>     <div class="stat-value">${topScore.toLocaleString()}</div></div>
    <div class="stat-card c-cyan">  <div class="stat-label">Avg Score</div>     <div class="stat-value">${avg.toLocaleString()}</div></div>
    ${hardestLv>0?`<div class="stat-card c-red"><div class="stat-label">Hardest Level</div><div class="stat-value">Lv ${hardestLv}</div></div>`:''}
  `;

  if (!allScores.length) return;

  document.getElementById('charts-grid').style.display = 'grid';

  // Chart 1: Top 15
  const top15 = allScores.slice(0,15);
  new Chart(document.getElementById('scoreChart'), {
    type:'bar', options: LIGHT_CHART,
    data:{ labels:top15.map(r=>r.name), datasets:[{
      data:top15.map(r=>r.score),
      backgroundColor:top15.map((_,i)=>i===0?'rgba(251,191,36,0.85)':i===1?'rgba(148,163,184,0.8)':i===2?'rgba(180,124,66,0.8)':'rgba(59,130,246,0.55)'),
      borderColor:top15.map((_,i)=>i===0?'#f59e0b':i===1?'#94a3b8':i===2?'#b45309':'#3b82f6'),
      borderWidth:1.5, borderRadius:5
    }]}
  });

  // Chart 2: Heatmap
  if (lvData.some(v=>v>0)) {
    document.getElementById('heatmap-card').style.display = 'block';
    new Chart(document.getElementById('heatmapChart'), {
      type:'bar',
      data:{ labels:lvLabels, datasets:[{
        data:lvData,
        backgroundColor:lvData.map(v=>heatColor(v/maxDeaths)),
        borderColor:lvData.map(v=>heatColor(Math.min(v/maxDeaths+.15,1))),
        borderWidth:1.5, borderRadius:4
      }]},
      options:{...LIGHT_CHART, plugins:{legend:{display:false}, tooltip:{callbacks:{label:ctx=>`  ${ctx.raw} death${ctx.raw!==1?'s':''}`}}}}
    });
  }

  // Chart 3: Daily players
  if (days.length) {
    document.getElementById('dap-card').style.display = 'block';
    new Chart(document.getElementById('dapChart'), {
      type:'line',
      data:{ labels:dayLabels, datasets:[{
        data:dayCounts, borderColor:'#06b6d4', backgroundColor:'rgba(6,182,212,0.08)',
        tension:.35, fill:true, pointBackgroundColor:'#06b6d4',
        pointRadius:4, pointHoverRadius:6
      }]},
      options:{...LIGHT_CHART, scales:{...LIGHT_CHART.scales, y:{...LIGHT_CHART.scales.y, ticks:{...LIGHT_CHART.scales.y.ticks, stepSize:1, precision:0}}}}
    });
  }

  // Table
  document.getElementById('table-card').style.display = 'block';
  updateSortUI();
  renderTable();
}

load();
</script>
</body>
</html>
