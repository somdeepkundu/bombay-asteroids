<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bombay Asteroids</title>
  <meta property="og:title" content="Bombay Asteroids">
  <meta property="og:description" content="A high-octane arcade shooter with infinite procedural difficulty. Pilot your spaceship above Mumbai, dodge and destroy asteroids!">
  <meta property="og:image" content="https://somdeepkundu.github.io/bombay-asteroids/assets/graphics/spaceship_full.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="https://somdeepkundu.github.io/bombay-asteroids/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Bombay Asteroids">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Bombay Asteroids">
  <meta name="twitter:description" content="High-octane arcade shooter above Mumbai. Infinite levels. Dodge & destroy asteroids!">
  <meta name="twitter:image" content="https://somdeepkundu.github.io/bombay-asteroids/assets/graphics/spaceship_full.svg">
  <meta name="description" content="A high-octane arcade shooter with infinite procedural difficulty, built with vanilla HTML/CSS/JS. Pilot your spaceship above Mumbai.">
  <link rel="icon" type="image/svg+xml" href="assets/graphics/spaceship_full.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000010">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>

  <div id="hud">
    <div id="health">
      <div id="healthbar"></div>
    </div>
    <div id="score"><span id="number">000</span> pts</div>
    <div id="level-indicator">LEVEL 1</div>
    <div id="timer"><span id="timer-number">52</span>s</div>
    <button id="mute-btn"   onclick="toggleMute()"      title="Toggle SFX (M key)">🔊</button>
    <button id="music-btn"  onclick="toggleMuteMusic()"  title="Toggle music">🥁</button>
    <button id="pause-btn"  onclick="togglePause()"      title="Pause game (P key)">⏸</button>
  </div>

  <!-- Pause overlay -->
  <div id="pause-overlay">
    <div class="pause-box">
      <div class="pause-title">PAUSED</div>
      <div class="pause-sub">Tap anywhere or press P to resume</div>
      <button class="pause-resume-btn" onclick="togglePause()">▶ RESUME</button>
    </div>
  </div>

  <div id="instructions">WASD / Arrow Keys &middot; SPACE to shoot</div>

  <div id="version"></div>

  <!-- Start Screen -->
  <div id="startscreen">
    <div class="start-box">
      <img class="start-logo" src="assets/graphics/spaceship_full.svg" alt="" />
      <div class="start-title">BOMBAY<br>ASTEROIDS</div>
      <div class="start-version" id="start-version"></div>
      <input
        type="text"
        id="player-name"
        class="name-input"
        placeholder="Enter your name"
        maxlength="20"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="start-btn" id="start-btn">PLAY</button>
      <div class="start-hint">WASD / Arrows &middot; SPACE to fire &middot; Hold at Lv.10+ for auto-fire</div>
    </div>
  </div>

  <!-- Intro / Story Screen -->
  <div id="introscreen">
    <div class="intro-box">
      <div class="intro-date" id="intro-date">📅 17 July, 2027 — 03:47 UTC</div>
      <div class="intro-text" id="intro-text"></div>
      <button class="intro-skip-btn" id="intro-skip-btn">▶ LAUNCH MISSION</button>
    </div>
  </div>

  <!-- Background music (tabla) — pre-loaded for mobile browsers -->
  <audio id="bg-music" src="assets/audio/game_table1.mp3" loop preload="auto" playsinline></audio>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Roll / Pitch lock warning -->
  <div id="lock-warning"></div>

  <!-- Mobile touch controls -->
  <div id="touch-controls">
    <!-- Analog joystick (replaces D-pad) -->
    <div id="joystick-zone">
      <div id="joystick-base">
        <div id="joystick-thumb"></div>
      </div>
    </div>
    <button id="fire-btn" class="action-btn">FIRE</button>
  </div>

  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
