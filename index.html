<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bombay Asteroids</title>
  <link rel="icon" type="image/svg+xml" href="assets/graphics/spaceship_full.svg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>

  <div id="hud">
    <div id="health">
      <div id="healthbar"></div>
    </div>
    <div id="score"><span id="number">000</span> pts</div>
    <div id="level-indicator">LEVEL 1</div>
    <div id="timer"><span id="timer-number">52</span>s</div>
  </div>

  <div id="instructions">WASD / Arrow Keys &middot; SPACE to shoot</div>

  <div id="version"></div>

  <!-- Start Screen -->
  <div id="startscreen">
    <div class="start-box">
      <img class="start-logo" src="assets/graphics/spaceship_full.svg" alt="" />
      <div class="start-title">BOMBAY<br>ASTEROIDS</div>
      <div class="start-version" id="start-version"></div>
      <input
        type="text"
        id="player-name"
        class="name-input"
        placeholder="Enter your name"
        maxlength="20"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="start-btn" id="start-btn">PLAY</button>
      <div class="start-hint">WASD / Arrow Keys &middot; SPACE to shoot</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Mobile touch controls -->
  <div id="touch-controls">
    <div id="dpad">
      <button id="up-btn" class="dpad-btn up">↑</button>
      <div class="dpad-middle">
        <button id="left-btn" class="dpad-btn left">←</button>
        <button id="center-btn" class="dpad-btn center"></button>
        <button id="right-btn" class="dpad-btn right">→</button>
      </div>
      <button id="down-btn" class="dpad-btn down">↓</button>
    </div>
    <button id="fire-btn" class="action-btn">FIRE</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
